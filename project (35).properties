package linkedlist;

public class Node {

    int data;
    Node next;
    Node head, tail;
    int size;

    public Node() {
        head = tail = null;
        size = 0;
    }

    void insertFirst(int a) {
        Node newNode = new Node();
        newNode.data = a;
        if (size == 0) {
            head = tail = newNode;
            newNode.next = null;
        } else {
            newNode.next = head;
            head = newNode;
        }
        size = size + 1;
    }

    void insertLast(int a) {
        Node newNode = new Node();
        newNode.data = a;
        if (size == 0) {
            head = tail = newNode;
            newNode.next = null;
        } else {
            tail.next = newNode;
            newNode.next = null;
            tail = newNode;
        }
        size = size + 1;
    }

    void insertAtPosition(int pos, int a) {
        Node newNode = new Node();
        newNode.data = a;
        if (pos == 1) {
            newNode.next = head;
            head = newNode;
            return;
        }
        if(pos==size+1){
            insertLast(a);
            return;
        }
        Node temp = head;
        int count = 1;
        while (temp != null && count < pos - 1) {
            temp = temp.next;
            count++;
        }

        if (temp == null) {
            System.out.println("The location is beyond the scope of the list.");
            return;
        }
        newNode.next = temp.next;
        temp.next = newNode;
    }

    void printLinkedList() {
        Node cur = head;
        while (cur != null) {
            if (cur == tail) {
                System.out.println(cur.data + "/");
            } else {
                System.out.print(cur.data + "----->" + "\t");
            }
            cur = cur.next;
        }
    }

    void removeFirt() {
        if (size == 0) {
            System.out.print("LLD is Empty");
        } else {
            if (size == 1) {
                head = tail = null;
                size = size - 1;
            } else {
                head = head.next;

                size = size - 1;
            }
        }
    }

    void removeLast() {
        if (size == 0) {
            System.out.print("LLD is Empty");
        } else {
            if (size == 1) {
                head = tail = null;
                size = size - 1;
            } else {
                Node cur = head.next;
                Node prev = head;
                while (cur != tail) {
                    prev = cur;
                    cur = cur.next;
                }
                prev.next = null;
                tail = prev;
                size = size - 1;
            }
        }
    }

    void removeItem(int dat) {
        if (size == 0) {
            System.out.print("LLD is Empty");
        } else {
            Node cur, prev;
            if (head.data == dat) {
                System.out.println("Data entered Found at First and deleted ... ");
                head = head.next;
                size = size - 1;
                if (size == 0) {
                    tail = null;
                }
            } else {
                cur = head.next;
                prev = head;
                while (cur != null) {
                    if (cur.data == dat) {
                        System.out.println("Data entered Found and deleted ... ");
                        break;
                    }
                    prev = cur;
                    cur = cur.next;
                }
                if (cur == null) {
                    System.out.println("data entered not found");
                } else {
                    prev.next = cur.next;
                    if (tail == cur) {
                        tail = prev;
                    }
                    size = size - 1;
                }
            }
        }
    }

    void update(int oldValue, int newValue) {
        Node temp = head;
        boolean found = false;

        while (temp != null) {
            if (temp.data == oldValue) {
                temp.data = newValue;
                System.out.println("Value " + oldValue + " updated to " + newValue);
                found = true;
                break;
            }
            temp = temp.next;
        }

        if (!found) {
            System.out.println("Value " + oldValue + " not found in the list.");
        }
    }

    void search(int value) {
        Node temp = head;
        int position = 0;
        boolean found = false;

        while (temp != null) {
            if (temp.data == value) {
                System.out.println("Value " + value + " found at position " + position);
                found = true;
                break; 
            }
            temp = temp.next;
            position++;
        }

        if (!found) {
            System.out.println("Value " + value + " not found in the list.");
        }
    }

    boolean isEmpty() {
        return size == 0;
    }
}
