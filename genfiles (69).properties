package queueproject;

public class Queue {

    private int maxSize;
    private int[] queueArray;
    private int front;
    private int rear;
    private int currentSize;

    public Queue(int size) {
        maxSize = size;
        queueArray = new int[maxSize];
        front = 0;
        rear = -1;
        currentSize = 0;
    }

    public void enqueue(int item) {
        if (isFull()) {
            System.out.println("Queue is full. Cannot enqueue " + item);
            return;
        }
        rear = (rear + 1) % maxSize;
        queueArray[rear] = item;
        currentSize++;
    }

    public int dequeue() {
        if (isEmpty()) {
            System.out.println("Queue is empty. Cannot dequeue.");
            return -1;
        }
        int item = queueArray[front];
        front = (front + 1) % maxSize;
        currentSize--;
        return item;
    }

    public boolean isEmpty() {
        return currentSize == 0;
    }

    public boolean isFull() {
        return currentSize == maxSize;
    }

    public void display() {
        System.out.println("-------------------------------------------");
        for (int i = 0; i < currentSize; i++) {
            System.out.print(queueArray[(front + i) % maxSize] + " ");
        }
        System.out.println();
        System.out.println("-------------------------------------------");
    }

    public void update(int oldValue, int newValue) {
        int[] updateArray = new int[currentSize];
        int count = 0;
        boolean found = false;
        int initialSize = currentSize;
        
        for (int i = 0; i < initialSize; i++) {
            int item = dequeue();
            if (item == oldValue && !found) {
                item = newValue;
                found = true;
                System.out.println("Updated value " + oldValue + " to " + newValue + " at position " + (i + 1));
            }
            updateArray[count++] = item;
        }

        for (int i = 0; i < count; i++) {
            enqueue(updateArray[i]);
        }

        if (!found) {
            System.out.println("Value " + oldValue + " not found in the queue.");
        }
    }

    public void search(int value) {
        boolean found = false;
        for (int i = 0; i < currentSize; i++) {
            int index = (front + i) % maxSize;
            if (queueArray[index] == value) {
                System.out.println("Found value " + value + " at position " + (i + 1));
                found = true;
                return;
            }
        }
        if (!found) {
            System.out.println("Value " + value + " not found in the queue.");
        }
    }
}
